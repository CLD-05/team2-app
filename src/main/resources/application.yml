server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/resourceops
    username: root
    password: 1234

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

resource-optimizer:
  cost:
    # Estimated request-based unit prices for Grafana comparison.
    # Override these values with environment variables in real environments.
    cpu-core-hour-usd: 0.0416
    memory-gib-hour-usd: 0.0052
