server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/resourceops
    username: root
    password: 1234

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

resource-optimizer:
  cost:
    # Accumulates resource_optimizer_cost_usd_total once per minute.
    accumulation-interval-ms: 60000
  cloudwatch:
    enabled: true
    fixed-rate-ms: 600000
  aws:
    region: ap-northeast-2
    alb-load-balancer-dimension: app/k8s-resource-resource-c5d4133575/0549ffba1540a2a9
    nat-gateway-id: nat-0854b9c44fe1d4867
    polling-minutes: 10
  aws-pricing:
    alb-hour-usd: 0.0225
    alb-lcu-hour-usd: 0.008
    nat-gateway-hour-usd: 0.045
    nat-gateway-data-gb-usd: 0.045
    data-transfer-out-gb-usd: 0.09
  simulation:
    dev-night-start-time: "17:20"
    dev-night-end-time: "08:00"
    alb-night-shutdown-enabled: true
    nat-night-shutdown-enabled: true
