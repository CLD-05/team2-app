server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/resourceops
    username: root
    password: 1234

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true
