name: CI Pipeline

on:
  push:
    branches: ["ci/pipeline"]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: team2-backend

permissions:
  id-token: write
  contents: read

jobs:
  maven-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsECRRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Maven 빌드
        run: mvn clean package -DskipTests

      - name: Docker 빌드 및 ECR Push
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

          docker build -t ${URI} .
          docker push ${URI}

          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV
